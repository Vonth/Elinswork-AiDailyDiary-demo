<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>灵感记录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* 整体布局：撑满视口高度，不让页面滚动 */
  html, body { height: 100%; overflow: hidden; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f7f5f0; color: #2c2c2a; }

  /* 外层容器：flex 列，撑满屏幕 */
  .app { max-width: 680px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }

  /* 顶部 header：固定高度 */
  .header { flex-shrink: 0; display: flex; justify-content: space-between; align-items: flex-start; padding: 1.25rem 1.25rem 0.75rem; background: #f7f5f0; }
  .header h1 { font-size: 18px; font-weight: 500; color: #2c2c2a; }
  .header .date { font-size: 12px; color: #888780; margin-top: 3px; }
  .tabs { display: flex; gap: 6px; }
  .tab { font-size: 13px; padding: 5px 13px; border-radius: 8px; border: 1px solid #d3d1c7; background: transparent; color: #5f5e5a; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .tab.active { background: #fff; color: #2c2c2a; }

  /* 各 panel 共用：flex 列，填满剩余高度 */
  .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 1.25rem; }

  /* ── 聊天 panel ── */
  .warning { flex-shrink: 0; background: #faeeda; border: 1px solid #fac775; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #633806; margin-bottom: 8px; display: none; }
  .session-nav { flex-shrink: 0; display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .nav-btn { font-size: 13px; padding: 4px 10px; border-radius: 7px; border: 1px solid #d3d1c7; background: transparent; color: #5f5e5a; cursor: pointer; font-family: inherit; transition: background 0.15s; white-space: nowrap; }
  .nav-btn:hover:not(:disabled) { background: #f0ede6; }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .nav-label { font-size: 13px; color: #888780; flex: 1; text-align: center; }

  /* 消息列表：flex:1 撑满，可滚动 */
  .messages { flex: 1; overflow-y: auto; padding-bottom: 8px; }
  .empty { text-align: center; padding: 5rem 0; color: #b4b2a9; font-size: 14px; }
  .bubble-wrap { display: flex; margin-bottom: 10px; }
  .bubble-wrap.user { justify-content: flex-end; }
  .bubble-wrap.assistant { justify-content: flex-start; }
  .bubble { max-width: 78%; padding: 9px 13px; font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
  .bubble.user { background: #e6f1fb; color: #185fa5; border-radius: 12px 12px 3px 12px; border: 1px solid #b5d4f4; }
  .bubble.assistant { background: #fff; color: #2c2c2a; border-radius: 12px 12px 12px 3px; border: 1px solid #e8e6e0; }

  /* 底部输入区：固定在底部 */
  .chat-bottom { flex-shrink: 0; padding: 8px 0 max(12px, env(safe-area-inset-bottom)); background: #f7f5f0; }
  .input-area { display: flex; gap: 8px; margin-bottom: 8px; }
  textarea { flex: 1; resize: none; font-size: 14px; padding: 9px 12px; border-radius: 8px; border: 1px solid #d3d1c7; background: #fff; color: #2c2c2a; line-height: 1.6; outline: none; font-family: inherit; }
  textarea:focus { border-color: #b4b2a9; }
  .btn { font-size: 14px; padding: 0 16px; border-radius: 8px; border: 1px solid #d3d1c7; background: transparent; color: #2c2c2a; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn:hover:not(:disabled) { background: #f0ede6; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-wide { width: 100%; padding: 9px; font-size: 13px; color: #888780; }

  /* ── 记录 panel ── */
  .records-scroll { flex: 1; overflow-y: auto; padding-bottom: 1.5rem; }
  .record-card { margin-bottom: 14px; background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; overflow: hidden; }
  .record-main { padding: 1rem 1.25rem; }
  .record-date { font-size: 12px; color: #b4b2a9; font-weight: 500; margin-bottom: 10px; }
  .record-content { font-size: 14px; line-height: 1.8; color: #2c2c2a; white-space: pre-wrap; }

  /* 查看原始对话 */
  .toggle-history { width: 100%; padding: 9px 1.25rem; font-size: 12px; color: #b4b2a9; background: #faf9f7; border: none; border-top: 1px solid #f0ede6; cursor: pointer; text-align: left; font-family: inherit; transition: background 0.15s; }
  .toggle-history:hover { background: #f0ede6; color: #888780; }
  .raw-chat { display: none; padding: 12px 1.25rem 1rem; background: #faf9f7; border-top: 1px solid #f0ede6; }
  .raw-chat.open { display: block; }
  .raw-bubble-wrap { display: flex; margin-bottom: 8px; }
  .raw-bubble-wrap.user { justify-content: flex-end; }
  .raw-bubble-wrap.assistant { justify-content: flex-start; }
  .raw-bubble { max-width: 82%; padding: 7px 11px; font-size: 13px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .raw-bubble.user { background: #e6f1fb; color: #185fa5; border-radius: 10px 10px 3px 10px; border: 1px solid #b5d4f4; }
  .raw-bubble.assistant { background: #fff; color: #5f5e5a; border-radius: 10px 10px 10px 3px; border: 1px solid #e8e6e0; }
  .raw-topic-label { font-size: 11px; color: #c4c2b9; margin: 10px 0 6px; }

  /* ── 设置 panel ── */
  .settings-scroll { flex: 1; overflow-y: auto; padding-bottom: 1.5rem; }
  .settings-box { background: #fff; border: 1px solid #e8e6e0; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .settings-box h3 { font-size: 12px; font-weight: 500; color: #b4b2a9; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }
  .field label { font-size: 13px; color: #5f5e5a; display: block; margin-bottom: 5px; }
  .field input[type="password"], .field select { width: 100%; padding: 7px 10px; border-radius: 7px; border: 1px solid #d3d1c7; font-size: 13px; font-family: inherit; outline: none; background: #f7f5f0; color: #2c2c2a; }
  .field input:focus, .field select:focus { border-color: #b4b2a9; background: #fff; }
  .hint { font-size: 11px; color: #b4b2a9; margin-top: 4px; }
  .memory-preview { font-size: 13px; color: #5f5e5a; line-height: 1.75; background: #f7f5f0; border-radius: 8px; padding: 10px 12px; white-space: pre-wrap; min-height: 60px; }
  .memory-empty { color: #b4b2a9; font-style: italic; }

  /* 开关 */
  .toggle-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 6px; }
  .toggle-wrap { position: relative; width: 38px; height: 22px; flex-shrink: 0; margin-top: 1px; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track { position: absolute; inset: 0; background: #d3d1c7; border-radius: 11px; cursor: pointer; transition: background 0.2s; }
  .toggle-wrap input:checked + .toggle-track { background: #4a9d6f; }
  .toggle-track::after { content: ''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s; box-shadow: 0 1px 3px rgba(0,0,0,.15); }
  .toggle-wrap input:checked + .toggle-track::after { transform: translateX(16px); }
  .toggle-label { font-size: 13px; color: #5f5e5a; line-height: 1.6; }

  /* Toast */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #2c2c2a; color: #fff; font-size: 13px; padding: 9px 20px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">

  <!-- 顶部 header -->
  <div class="header">
    <div>
      <h1>灵感记录</h1>
      <div class="date" id="today-label"></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('chat')">聊天</button>
      <button class="tab" onclick="switchTab('records')">记录</button>
      <button class="tab" onclick="switchTab('settings')">设置</button>
    </div>
  </div>

  <!-- 聊天 panel -->
  <div class="panel" id="panel-chat">
    <div class="warning" id="api-warning">请先在「设置」里填入 API Key，然后选择使用 DeepSeek 或 Claude</div>
    <div class="session-nav" id="session-nav"></div>
    <div class="messages" id="messages"></div>
    <div class="chat-bottom">
      <div class="input-area">
        <textarea id="input-box" placeholder="随便说点什么..." rows="2" onkeydown="handleKey(event)"></textarea>
        <button class="btn" id="btn-send" onclick="send()" style="align-self:stretch">发送</button>
      </div>
      <button class="btn btn-wide" id="btn-summarize" onclick="summarize()" style="display:none">整理今日记录</button>
    </div>
  </div>

  <!-- 记录 panel -->
  <div class="panel" id="panel-records" style="display:none">
    <div class="records-scroll" id="records-list">
      <div class="empty">还没有记录，先去聊聊吧</div>
    </div>
  </div>

  <!-- 设置 panel -->
  <div class="panel" id="panel-settings" style="display:none">
    <div class="settings-scroll">
      <div class="settings-box">
        <h3>API 配置</h3>
        <div class="field">
          <label>使用哪个 AI</label>
          <select id="provider-select" onchange="onProviderChange()">
            <option value="deepseek">DeepSeek</option>
            <option value="anthropic">Anthropic (Claude)</option>
          </select>
        </div>
        <div class="field" id="field-deepseek">
          <label>DeepSeek API Key</label>
          <input type="password" id="deepseek-key" placeholder="sk-..." />
          <div class="hint">在 platform.deepseek.com → API Keys 获取</div>
        </div>
        <div class="field" id="field-anthropic" style="display:none">
          <label>Anthropic API Key</label>
          <input type="password" id="anthropic-key" placeholder="sk-ant-..." />
          <div class="hint">在 console.anthropic.com → API Keys 获取</div>
        </div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
          <button class="btn" onclick="saveSettings()" style="padding:7px 18px;font-size:13px">保存设置</button>
          <span id="save-tip" style="font-size:12px;color:#0f6e56;display:none">✓ 已保存</span>
        </div>
      </div>

      <div class="settings-box">
        <h3>自动整理</h3>
        <div class="field">
          <label>自动整理前一天的记录</label>
          <div class="toggle-row">
            <label class="toggle-wrap">
              <input type="checkbox" id="auto-toggle" onchange="saveAutoSetting()">
              <span class="toggle-track"></span>
            </label>
            <span class="toggle-label">开启后，凌晨4点后首次打开 App 时，<br>自动将前一天的聊天整理成日记</span>
          </div>
        </div>
      </div>

      <div class="settings-box">
        <h3>AI 的记忆</h3>
        <div class="field">
          <label>AI 目前对你的了解（每次整理记录后自动更新）</label>
          <div class="memory-preview" id="memory-preview"></div>
        </div>
        <div style="margin-top:10px">
          <button class="btn" onclick="clearMemory()" style="font-size:13px;padding:6px 14px;color:#a32d2d;border-color:#f09595">清除记忆</button>
        </div>
      </div>

      <div class="settings-box">
        <h3>数据管理</h3>
        <div class="field">
          <label>清除所有聊天记录、整理内容和记忆</label>
          <button class="btn" onclick="clearAll()" style="margin-top:6px;font-size:13px;padding:6px 14px;color:#a32d2d;border-color:#f09595">清除全部数据</button>
        </div>
      </div>
    </div>
  </div>

</div><!-- .app -->

<div class="toast" id="toast"></div>

<script>
// ── Prompts ───────────────────────────────────────────────────────────────────

const CHAT_SYSTEM_BASE = `你是用户的私人对话伙伴，陪用户记录想法、梳理问题、审视生活。

你的角色更像一个真正参与TA生活的朋友——不只是倾听，而是真的在思考TA说的事情。当TA分享一个想法时，你会从TA的视角出发去理解，同时也带入自己的判断；当TA遇到问题时，你不急着给建议，而是先帮TA把问题看清楚；当你觉得TA的某个想法值得深挖，或者有什么没想到的角落，你会直接说出来。

语气自然、直接，不用刻意保持轻松，也不需要每次都表示肯定。不绕弯子，不说废话。回复长度跟着话题走——简单的事简短回，值得聊的事就真的聊进去，不硬性限制句数。用中文。`;

const SUMMARY_PROMPT = `你是用户的私人日记整理者。根据今天的对话，写一篇有温度的今日记录。

【今天的状态】
用一两句话描述用户今天整体的状态或能量——不是在做什么，而是感觉怎么样。

【今天留下的东西】
2-4条，每条用完整的一句话写。想法、项目进展、生活片段、动物、人、某个触动到你的细节——都可以进来，不分大小，只要今天真实发生过。写法像日记，不像任务清单。

【一个值得带走的问题】
只写一个问题。不是总结用户说过的话，而是顺着今天聊的内容，提出一个用户可能还没想到、但值得继续琢磨的角度。

要求：只用用户真实提到的内容，不编造。语气像一个真正了解你的朋友在帮你回顾今天，不要书面感，不要报告感。200字以内，用中文。`;

const MEMORY_PROMPT = `根据下面的对话内容和已有的用户记忆，更新用户画像。包含：用户正在做的事、关注的主题、近期情绪状态、性格偏好、上次聊到的重要内容。写成一段自然的描述，200字以内，用中文。只输出更新后的用户画像文字，不要任何前缀或说明。`;

// ── 状态 ──────────────────────────────────────────────────────────────────────

const todayKey = new Date().toISOString().split('T')[0];
document.getElementById('today-label').textContent =
  new Date().toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'});

let sessions = [];
let currentIdx = 0;
function currentMsgs() { return sessions[currentIdx].messages; }

// ── 迁移：把所有旧格式 chat-日期 迁移为 sessions-日期 ──────────────────────────

function migrateAllOldChats() {
  const oldKeys = Object.keys(localStorage).filter(k => k.startsWith('chat-'));
  oldKeys.forEach(oldKey => {
    const dateKey = oldKey.replace('chat-', '');
    const newKey = 'sessions-' + dateKey;
    if (!localStorage.getItem(newKey)) {
      const msgs = JSON.parse(localStorage.getItem(oldKey) || '[]');
      if (msgs.length) {
        localStorage.setItem(newKey, JSON.stringify([{ id: Date.now(), messages: msgs }]));
      }
    }
    localStorage.removeItem(oldKey);
  });
}

// ── 话题 / 存储 ───────────────────────────────────────────────────────────────

function loadTodaySessions() {
  const saved = localStorage.getItem('sessions-' + todayKey);
  sessions = saved ? JSON.parse(saved) : [];
  if (!sessions.length) sessions = [{ id: Date.now(), messages: [] }];
  currentIdx = sessions.length - 1;
  saveSessions();
}

function saveSessions() {
  localStorage.setItem('sessions-' + todayKey, JSON.stringify(sessions));
}

function getYesterdayKey() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().split('T')[0];
}

function getChatSystem() {
  const mem = localStorage.getItem('user-memory') || '';
  return mem ? CHAT_SYSTEM_BASE + '\n\n关于用户的记忆：\n' + mem : CHAT_SYSTEM_BASE;
}

// ── 话题导航 ──────────────────────────────────────────────────────────────────

function renderSessionNav() {
  const total = sessions.length, i = currentIdx;
  document.getElementById('session-nav').innerHTML =
    `<button class="nav-btn" onclick="gotoSession(${i-1})" ${i===0?'disabled':''}>←</button>
     <span class="nav-label">话题 ${i+1} / ${total}</span>
     <button class="nav-btn" onclick="gotoSession(${i+1})" ${i===total-1?'disabled':''}>→</button>
     <button class="nav-btn" onclick="newSession()" style="margin-left:4px">＋ 新话题</button>`;
}

function gotoSession(i) {
  if (i < 0 || i >= sessions.length) return;
  currentIdx = i; renderMessages(); renderSessionNav();
}

function newSession() {
  sessions.push({ id: Date.now(), messages: [] });
  saveSessions(); currentIdx = sessions.length - 1;
  renderMessages(); renderSessionNav();
  document.getElementById('input-box').focus();
}

// ── 设置 ──────────────────────────────────────────────────────────────────────

function loadSettings() {
  document.getElementById('provider-select').value = localStorage.getItem('provider') || 'deepseek';
  document.getElementById('deepseek-key').value = localStorage.getItem('deepseek-key') || '';
  document.getElementById('anthropic-key').value = localStorage.getItem('anthropic-key') || '';
  document.getElementById('auto-toggle').checked = localStorage.getItem('auto-summarize') === 'on';
  onProviderChange();
}

function onProviderChange() {
  const p = document.getElementById('provider-select').value;
  document.getElementById('field-deepseek').style.display = p === 'deepseek' ? '' : 'none';
  document.getElementById('field-anthropic').style.display = p === 'anthropic' ? '' : 'none';
}

function saveSettings() {
  localStorage.setItem('provider', document.getElementById('provider-select').value);
  localStorage.setItem('deepseek-key', document.getElementById('deepseek-key').value.trim());
  localStorage.setItem('anthropic-key', document.getElementById('anthropic-key').value.trim());
  const tip = document.getElementById('save-tip');
  tip.style.display = 'inline';
  setTimeout(() => tip.style.display = 'none', 2000);
}

function saveAutoSetting() {
  localStorage.setItem('auto-summarize', document.getElementById('auto-toggle').checked ? 'on' : 'off');
}

function getConfig() {
  const provider = localStorage.getItem('provider') || 'deepseek';
  const key = provider === 'deepseek'
    ? (localStorage.getItem('deepseek-key') || '')
    : (localStorage.getItem('anthropic-key') || '');
  return { provider, key: key.trim() };
}

function hasKey() { return !!getConfig().key; }

// ── 启动 ──────────────────────────────────────────────────────────────────────

migrateAllOldChats();   // 先迁移所有历史旧数据
loadTodaySessions();
loadSettings();
renderMessages();
renderSessionNav();
renderRecords();
checkAutoSummarize();

// ── Tab 切换 ──────────────────────────────────────────────────────────────────

function switchTab(tab) {
  ['chat','records','settings'].forEach(t => {
    document.getElementById('panel-' + t).style.display = t === tab ? '' : 'none';
    document.querySelectorAll('.tab')[['chat','records','settings'].indexOf(t)].classList.toggle('active', t === tab);
  });
  if (tab === 'chat')     document.getElementById('api-warning').style.display = hasKey() ? 'none' : '';
  if (tab === 'records')  renderRecords();
  if (tab === 'settings') renderMemoryPreview();
}

// ── Toast ─────────────────────────────────────────────────────────────────────

let toastTimer = null;
function showToast(msg, duration = 3500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

// ── 消息渲染 ──────────────────────────────────────────────────────────────────

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderMessages() {
  const msgs = currentMsgs();
  const c = document.getElementById('messages');
  c.innerHTML = msgs.length
    ? msgs.map(m => `<div class="bubble-wrap ${m.role}"><div class="bubble ${m.role}">${esc(m.content)}</div></div>`).join('')
    : '<div class="empty">今天有什么想法？随便聊聊</div>';
  if (msgs.length) c.scrollTop = c.scrollHeight;
  document.getElementById('btn-summarize').style.display =
    sessions.some(s => s.messages.length > 0) ? 'block' : 'none';
}

// ── AI 调用 ───────────────────────────────────────────────────────────────────

async function callAI(msgs, system) {
  const { provider, key } = getConfig();
  if (!key) throw new Error('请先在设置里填入 API Key');
  if (provider === 'deepseek') {
    const allMsgs = system ? [{ role:'system', content:system }, ...msgs] : msgs;
    const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key },
      body: JSON.stringify({ model: 'deepseek-chat', messages: allMsgs, max_tokens: 1000 })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.choices[0].message.content;
  } else {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        ...(system ? { system } : {}),
        messages: msgs
      })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error.message);
    return d.content[0].text;
  }
}

// ── 发送 ──────────────────────────────────────────────────────────────────────

async function send() {
  if (!hasKey()) { document.getElementById('api-warning').style.display = ''; return; }
  const box = document.getElementById('input-box');
  const text = box.value.trim();
  if (!text) return;
  currentMsgs().push({ role: 'user', content: text });
  box.value = ''; renderMessages();
  const c = document.getElementById('messages');
  const t = document.createElement('div');
  t.id = 'typing'; t.className = 'bubble-wrap assistant';
  t.innerHTML = '<div class="bubble assistant" style="color:#b4b2a9">···</div>';
  c.appendChild(t); c.scrollTop = c.scrollHeight;
  document.getElementById('btn-send').disabled = true;
  try {
    const reply = await callAI(currentMsgs(), getChatSystem());
    currentMsgs().push({ role: 'assistant', content: reply });
    saveSessions();
  } catch(e) {
    currentMsgs().push({ role: 'assistant', content: '出错了：' + e.message });
  }
  document.getElementById('typing')?.remove();
  renderMessages();
  document.getElementById('btn-send').disabled = false;
}

// ── 整理逻辑（手动 + 自动共用）──────────────────────────────────────────────

async function summarizeDate(dateKey, dateSessions) {
  const active = dateSessions.filter(s => s.messages && s.messages.length > 0);
  if (!active.length) return;
  let conv = '';
  active.forEach((s, i) => {
    if (active.length > 1) conv += `【话题 ${i + 1}】\n`;
    conv += s.messages.map(m => (m.role === 'user' ? '我' : '助手') + '：' + m.content).join('\n');
    conv += '\n\n';
  });
  const dateLabel = new Date(dateKey + 'T12:00:00')
    .toLocaleDateString('zh-CN', {year:'numeric', month:'long', day:'numeric'});

  const content = await callAI(
    [{ role: 'user', content: SUMMARY_PROMPT + '\n\n对话：\n' + conv }], null
  );
  let records = JSON.parse(localStorage.getItem('records') || '[]');
  records = [{ date: dateKey, label: dateLabel, content }, ...records.filter(r => r.date !== dateKey)];
  records.sort((a, b) => b.date.localeCompare(a.date));
  localStorage.setItem('records', JSON.stringify(records));

  const existingMem = localStorage.getItem('user-memory') || '（暂无）';
  const newMem = await callAI(
    [{ role: 'user', content: MEMORY_PROMPT + '\n\n已有记忆：\n' + existingMem + '\n\n今天的对话：\n' + conv }], null
  );
  localStorage.setItem('user-memory', newMem);
}

async function summarize() {
  if (!sessions.some(s => s.messages.length > 0)) return;
  const btn = document.getElementById('btn-summarize');
  btn.disabled = true; btn.textContent = '整理中…';
  try {
    await summarizeDate(todayKey, sessions);
    switchTab('records');
  } catch(e) { alert('整理失败：' + e.message); }
  btn.disabled = false; btn.textContent = '整理今日记录';
}

// ── 自动整理 ──────────────────────────────────────────────────────────────────

async function checkAutoSummarize() {
  if (localStorage.getItem('auto-summarize') !== 'on') return;
  if (!hasKey()) return;
  if (new Date().getHours() < 4) return;
  const yk = getYesterdayKey();
  const ySessions = JSON.parse(localStorage.getItem('sessions-' + yk) || '[]');
  if (!ySessions.some(s => s.messages && s.messages.length > 0)) return;
  const records = JSON.parse(localStorage.getItem('records') || '[]');
  if (records.some(r => r.date === yk)) return;
  showToast('正在整理昨日记录…', 60000);
  try {
    await summarizeDate(yk, ySessions);
    showToast('昨日记录已整理好 ✓');
  } catch(e) {
    showToast('自动整理失败，可手动整理');
  }
}

// ── 记录页 ────────────────────────────────────────────────────────────────────

function renderRecords() {
  const records = JSON.parse(localStorage.getItem('records') || '[]');
  const c = document.getElementById('records-list');
  if (!records.length) { c.innerHTML = '<div class="empty" style="margin-top:3rem">还没有记录，先去聊聊吧</div>'; return; }
  c.innerHTML = records.map(r => {
    // 读取该天的原始对话
    const rawSessions = JSON.parse(localStorage.getItem('sessions-' + r.date) || '[]');
    const activeSessions = rawSessions.filter(s => s.messages && s.messages.length > 0);
    const hasRaw = activeSessions.length > 0;

    let rawHtml = '';
    if (hasRaw) {
      activeSessions.forEach((s, si) => {
        if (activeSessions.length > 1) {
          rawHtml += `<div class="raw-topic-label">话题 ${si + 1}</div>`;
        }
        rawHtml += s.messages.map(m =>
          `<div class="raw-bubble-wrap ${m.role}"><div class="raw-bubble ${m.role}">${esc(m.content)}</div></div>`
        ).join('');
      });
    }

    return `<div class="record-card">
      <div class="record-main">
        <div class="record-date">${r.label}</div>
        <div class="record-content">${esc(r.content)}</div>
      </div>
      ${hasRaw ? `
        <button class="toggle-history" onclick="toggleRaw(this)">查看原始对话 ▾</button>
        <div class="raw-chat">${rawHtml}</div>
      ` : ''}
    </div>`;
  }).join('');
}

function toggleRaw(btn) {
  const rawDiv = btn.nextElementSibling;
  const open = rawDiv.classList.toggle('open');
  btn.textContent = open ? '收起对话 ▴' : '查看原始对话 ▾';
}

// ── 记忆 ──────────────────────────────────────────────────────────────────────

function renderMemoryPreview() {
  const mem = localStorage.getItem('user-memory') || '';
  const el = document.getElementById('memory-preview');
  el.textContent = mem || '还没有记忆，整理第一次记录后会自动生成';
  el.classList.toggle('memory-empty', !mem);
}

function clearMemory() {
  if (!confirm('确定清除 AI 的记忆吗？')) return;
  localStorage.removeItem('user-memory');
  renderMemoryPreview();
}

// ── 清除全部 ──────────────────────────────────────────────────────────────────

function clearAll() {
  if (!confirm('确定清除所有聊天、记录和 AI 记忆吗？')) return;
  Object.keys(localStorage)
    .filter(k => k.startsWith('chat-') || k.startsWith('sessions-') || k === 'records' || k === 'user-memory')
    .forEach(k => localStorage.removeItem(k));
  sessions = [{ id: Date.now(), messages: [] }];
  currentIdx = 0; saveSessions();
  renderMessages(); renderSessionNav(); renderRecords();
  alert('已清除');
}
</script>
