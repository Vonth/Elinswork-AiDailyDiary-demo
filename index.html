<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<script>
  try {
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.dataset.theme = 'dark';
    }
  } catch (error) {}
</script>
<title>灵感记录</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <h1>灵感记录</h1>
      <div class="date" id="today-label"></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('chat')">聊天</button>
      <button class="tab" onclick="switchTab('records')">记录</button>
      <button class="tab" onclick="switchTab('settings')">设置</button>
    </div>
  </div>

  <!-- 聊天 panel -->
  <div class="panel" id="panel-chat">
    <div class="warning" id="api-warning">请先在「设置」里填入 API Key，然后选择使用 DeepSeek 或 Claude</div>
    <div class="session-nav" id="session-nav"></div>
    <div class="messages" id="messages"></div>
    <div class="chat-bottom">
      <div class="composer-shell" id="composer-shell">
        <textarea
          id="input-box"
          placeholder="随便说点什么..."
          rows="2"
          onkeydown="handleKey(event)"
          oninput="handleComposerInput()"
        ></textarea>
        <div class="composer-actions">
          <button class="btn-mic" id="btn-mic" onclick="toggleComposerMenu()" title="更多操作" aria-label="更多操作">···</button>
          <button class="composer-send-btn" id="btn-send" onclick="send()" type="button">发送</button>
        </div>
        <div class="composer-menu" id="composer-menu">
          <button class="composer-menu-item" id="composer-voice-action" onclick="triggerVoiceFromComposer()" type="button">语音输入</button>
        </div>
      </div>
      <div class="status-note" id="voice-status" aria-live="polite"></div>
    </div>
  </div>

  <!-- 记录 panel -->
  <div class="panel" id="panel-records" style="display:none">
    <div class="records-topbar" id="records-topbar" style="display:none">
      <button class="action-btn records-summarize-btn" id="btn-summarize-yesterday" onclick="summarizeYesterday()" style="display:none">整理昨天记录</button>
      <button class="action-btn records-summarize-btn" id="btn-summarize" onclick="summarize()" style="display:none">整理今日记录</button>
    </div>
    <div class="records-scroll" id="records-list">
      <div class="empty">还没有记录，先去聊聊吧</div>
    </div>
  </div>

  <!-- 设置 panel -->
  <div class="panel" id="panel-settings" style="display:none">
    <div class="settings-scroll">
      <div class="settings-box">
        <h3>API 配置</h3>
        <div class="field">
          <label>使用哪个 AI</label>
          <select id="provider-select" onchange="onProviderChange()">
            <option value="deepseek">DeepSeek</option>
            <option value="anthropic">Anthropic (Claude)</option>
          </select>
        </div>
        <div class="field" id="field-deepseek">
          <label>DeepSeek API Key</label>
          <input type="password" id="deepseek-key" placeholder="sk-..." />
          <div class="hint">在 platform.deepseek.com → API Keys 获取</div>
        </div>
        <div class="field" id="field-anthropic" style="display:none">
          <label>Anthropic API Key</label>
          <input type="password" id="anthropic-key" placeholder="sk-ant-..." />
          <div class="hint">在 console.anthropic.com → API Keys 获取</div>
        </div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:10px">
          <button class="btn" onclick="saveSettings()" style="padding:7px 18px;font-size:13px">保存设置</button>
          <span id="save-tip" style="font-size:12px;color:#0f6e56;display:none">✓ 已保存</span>
        </div>
      </div>

      <div class="settings-box">
        <h3>外观</h3>
        <div class="field">
          <label>日夜模式</label>
          <div class="toggle-row">
            <label class="toggle-wrap">
              <input type="checkbox" id="theme-toggle" onchange="saveThemeSetting()">
              <span class="toggle-track"></span>
            </label>
            <span class="toggle-label" id="theme-label"></span>
          </div>
        </div>
      </div>

      <div class="settings-box">
        <h3>自动整理</h3>
        <div class="field">
          <label>自动整理前一天的记录</label>
          <div class="toggle-row">
            <label class="toggle-wrap">
              <input type="checkbox" id="auto-toggle" onchange="saveAutoSetting()">
              <span class="toggle-track"></span>
            </label>
            <span class="toggle-label">开启后，凌晨4点后首次打开 App 时，<br>自动将前一天的聊天整理成日记</span>
          </div>
          <div class="status-note" id="auto-status" aria-live="polite"></div>
        </div>
      </div>

      <div class="settings-box">
        <h3>AI 的记忆</h3>
        <div class="field">
          <label>AI 目前对你的了解（每次整理记录后自动更新）</label>
          <div class="memory-preview" id="memory-preview"></div>
        </div>
        <div style="margin-top:10px">
          <button class="btn" onclick="clearMemory()" style="font-size:13px;padding:6px 14px;color:#a32d2d;border-color:#f09595">清除记忆</button>
        </div>
      </div>

      <div class="settings-box">
        <h3>数据管理</h3>
        <div class="field">
          <label>整体导出或导入全部聊天记录、灵感记录和 AI 记忆</label>
          <div class="data-actions">
            <button class="btn" onclick="exportAllData()">导出全部</button>
            <button class="btn" onclick="openImportAllDialog()">导入全部</button>
          </div>
          <div class="hint">整体导入会覆盖当前全部聊天、记录和 AI 记忆，不会改动 API Key、主题和自动整理设置。</div>
        </div>
        <div class="field">
          <label for="data-date-input">按某一天导出或导入聊天记录和灵感记录</label>
          <div class="data-date-row">
            <input type="date" id="data-date-input">
            <div class="data-actions">
              <button class="btn" onclick="exportDayData()">导出某天</button>
              <button class="btn" onclick="openImportDayDialog()">导入某天</button>
            </div>
          </div>
          <div class="hint">按天导入会使用文件里的日期，覆盖那一天的聊天和记录。</div>
        </div>
        <div class="field">
          <label>清除所有聊天记录、整理内容和记忆</label>
          <button class="btn" onclick="clearAll()" style="margin-top:6px;font-size:13px;padding:6px 14px;color:#a32d2d;border-color:#f09595">清除全部数据</button>
        </div>
        <input type="file" id="import-all-input" accept=".json,application/json" onchange="handleImportAllFile(event)" hidden>
        <input type="file" id="import-day-input" accept=".json,application/json" onchange="handleImportDayFile(event)" hidden>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
